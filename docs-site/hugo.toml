baseURL = 'https://lupppig.github.io/dbackup/'
languageCode = 'en-us'
title = 'dbackup'
theme = 'hugo-book'

[params]
  # (Optional, default true) Controls table of contents visibility on right side of pages.
  BookToC = true

  # (Optional, default none) Set the path to a logo for the book.
  BookLogo = 'https://raw.githubusercontent.com/lupppig/dbackup/main/ui/public/dbackup.svg'

  # (Optional, default none) Set leaf bundle to render as side menu
  BookMenuBundle = '/menu'

  # (Optional, default true) Enable search button, operated by flexsearch
  BookSearch = true

  # Custom branding colors (Blue matching dbackup logo)
  [params.BookThemeColor]
    primary = "#3182ce"
